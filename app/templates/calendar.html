{% extends "base.html" %}

{% block content %}
<h1>Calendar</h1>

<div class="card">
    <h3>Calendar by day</h3>
    <input id="calendar_day" type="date">
    <button onclick="loadCalendarDay()">Load day</button>
    <div id="calendar-day-result"></div>
</div>

<div class="card">
    <h3>Calendar by month</h3>
    <input id="calendar_year" type="number" placeholder="Year">
    <input id="calendar_month" type="number" min="1" max="12" placeholder="Month">
    <button onclick="loadCalendarMonth()">Load month</button>
    <div id="calendar-month-result"></div>
</div>
{% endblock %}
