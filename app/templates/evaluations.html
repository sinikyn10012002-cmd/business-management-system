<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluations</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-page="evaluations">
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand">BMS</div>
      <nav id="main-nav" class="nav"></nav>
      <div style="margin-top:18px"><button id="logout-btn" class="secondary" style="width:100%">Выйти</button></div>
    </aside>
    <main class="content">
      <section class="hero">
        <h1 class="page-title">Оценка работы</h1>
        <p class="page-subtitle">Оценки по задачам, средний балл и фильтр по периоду.</p>
      </section>
      <div id="global-message" class="hidden"></div>
      <div class="grid cols-2">
        <section class="panel" id="create-evaluation-panel">
          <h2>Оценить выполненную задачу</h2>
          <form id="evaluation-form" class="stack">
            <div class="row">
              <div>
                <label>ID задачи</label>
                <input id="evaluation-task-id" type="number" required>
              </div>
              <div>
                <label>Балл (1–5)</label>
                <input id="evaluation-score" type="number" min="1" max="5" required>
              </div>
            </div>
            <div>
              <label>Комментарий</label>
              <textarea id="evaluation-comment"></textarea>
            </div>
            <div class="row actions"><button type="submit">Сохранить оценку</button></div>
          </form>
        </section>
        <section class="panel">
          <h2>Средний балл</h2>
          <div class="kpi"><div class="muted">Общий средний</div><div id="average-score" class="value">—</div></div>
          <form id="period-form" class="stack" style="margin-top:14px;">
            <div class="row">
              <div>
                <label>Дата с</label>
                <input id="period-from" type="datetime-local" required>
              </div>
              <div>
                <label>Дата по</label>
                <input id="period-to" type="datetime-local" required>
              </div>
            </div>
            <button type="submit">Посчитать за период</button>
          </form>
          <div class="muted" style="margin-top:10px">Средний за период: <strong id="period-average-result">—</strong></div>
        </section>
      </div>
      <section class="panel" style="margin-top:18px;">
        <h2>Мои оценки</h2>
        <div id="evaluations-list" class="list"></div>
      </section>
    </main>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
